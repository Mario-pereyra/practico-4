<style>

        body {
            font-family: 'Hanken Grotesk', sans-serif;

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-surface-container-low antialiased relative overflow-hidden">
<!-- Decorative background elements to reinforce the "cinematic yet corporate" feel without being overwhelming -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(theme('colors.primary-container') 1px, transparent 1px); background-size: 32px 32px;"></div>
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Registration Card -->
<main class="w-full max-w-md bg-surface-container-lowest border border-border-subtle rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.02)] relative z-10 flex flex-col overflow-hidden">
<!-- Subtle top accent line -->
<div class="h-1 w-full bg-primary-container"></div>
<div class="p-8 sm:p-10">
<!-- Brand / Header -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-high mb-4">
<span class="material-symbols-outlined text-primary-container text-2xl" style="font-variation-settings: 'FILL' 1;">movie</span>
</div>
<h1 class="font-headline-md text-headline-md text-text-main mb-2">Crear cuenta</h1>
<p class="font-body-sm text-body-sm text-text-muted">Ingresa tus datos para acceder al portal</p>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Full Name Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1.5" for="fullName">Nombre completo</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-lg">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 font-body-md text-body-md text-text-main bg-surface-container-lowest border border-border-subtle rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors placeholder:text-text-muted/60" id="fullName" name="fullName" placeholder="Ej. Ana García" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1.5" for="email">Correo electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 font-body-md text-body-md text-text-main bg-surface-container-lowest border border-border-subtle rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors placeholder:text-text-muted/60" id="email" name="email" placeholder="tu@correo.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1.5" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 font-body-md text-body-md text-text-main bg-surface-container-lowest border border-border-subtle rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors placeholder:text-text-muted/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1.5" for="confirmPassword">Confirmar contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-lg">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 font-body-md text-body-md text-text-main bg-surface-container-lowest border border-border-subtle rounded-lg focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-colors placeholder:text-text-muted/60" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Clarification Text -->
<div class="flex items-start gap-2 pt-1">
<span class="material-symbols-outlined text-text-muted text-base mt-0.5">info</span>
<p class="font-body-sm text-body-sm text-text-muted">
                        El registro crea una cuenta de cliente
                    </p>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-lg text-label-lg text-on-primary-container bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors" type="submit">
                        Registrarme
                    </button>
</div>
</form>
<!-- Login Link -->
<div class="mt-6 text-center">
<p class="font-body-sm text-body-sm text-text-muted">
                    ¿Ya tienes una cuenta? 
                    <a class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors ml-1" href="#">
                        Ya tengo cuenta
                    </a>
</p>
</div>
</div>
</main>
