<h2 class="font-headline-md text-headline-md text-text-main mb-6">Iniciar sesión</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-background mb-2" for="email">Correo Electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-border-subtle rounded bg-surface-white text-text-main focus:ring-primary-container focus:border-primary-container font-body-md text-body-md transition-colors" id="email" name="email" placeholder="tu@correo.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-background mb-2" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-border-subtle rounded bg-surface-white text-text-main focus:ring-primary-container focus:border-primary-container font-body-md text-body-md transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-2 px-4 border border-transparent rounded bg-primary-container text-on-primary font-label-lg text-label-lg hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors shadow-sm" type="submit">
                        Ingresar
                    </button>
</div>
</form>
</div>

<p class="font-body-sm text-body-sm text-text-muted">

</p>
